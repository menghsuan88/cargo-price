<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>外車報價查詢系統</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Font -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }

    .animate-fade-in {
      animation: fadeIn .35s ease-out;
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(8px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>

<body class="bg-slate-100">
  <div id="root"></div>

  <!-- ✅ 載入資料 -->
  <script src="./data/pricingData.js"></script>

  <script type="text/babel">
    const { useState } = React;

    /**
     * ✅ 最終且穩定的車輛類型判斷
     * 規則：
     * - vehicles[key] 是 object
     * - 裡面至少有一個 key 是合法取件地點
     * - 該取件地點的 value 是「報價陣列」
     */
    function isVehicleType(origin, key) {
      const vehicleObj = pricingData?.[origin]?.vehicles?.[key];
      const pickups = pricingData?.[origin]?.pickupLocations ?? [];

      if (!vehicleObj || typeof vehicleObj !== 'object' || Array.isArray(vehicleObj)) {
        return false;
      }

      return Object.keys(vehicleObj).some(p =>
        pickups.includes(p) && Array.isArray(vehicleObj[p])
      );
    }

    function App() {
      const [origin, setOrigin] = useState('');
      const [pickup, setPickup] = useState('');
      const [vehicle, setVehicle] = useState('');

      const rawResults =
        pricingData?.[origin]?.vehicles?.[vehicle]?.[pickup] ?? [];

      /**
       * ✅ 報價整理規則
       * - 保留：數字價格、電洽
       * - 排除：null / undefined / '無'
       * - 排序：數字 → 電洽
       */
      const results = rawResults
        .filter(r => r.price !== null && r.price !== undefined && r.price !== '無')
        .sort((a, b) => {
          if (typeof a.price === 'number' && typeof b.price === 'number') {
            return a.price - b.price;
          }
          if (typeof a.price === 'number') return -1;
          if (typeof b.price === 'number') return 1;
          return 0;
        });

      const minPrice =
        results.find(r => typeof r.price === 'number')?.price ?? null;

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md w-full bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">

            {/* Header */}
            <div className="bg-[#FFCC00] p-6 text-center border-b-4 border-red-600">
              <h1 className="text-2xl font-black italic text-red-600">
                外車報價查詢系統
              </h1>
            </div>

            <div className="p-6 space-y-6">

              {/* 1. 發車地點 */}
              <div>
                <label className="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                  1. 選擇發車地點
                </label>
                <select
                  className="w-full p-3 border-2 border-slate-200 rounded-xl font-bold"
                  value={origin}
                  onChange={e => {
                    setOrigin(e.target.value);
                    setPickup('');
                    setVehicle('');
                  }}
                >
                  <option value="">請選擇</option>
                  {Object.keys(pricingData).map(loc => (
                    <option key={loc} value={loc}>{loc}</option>
                  ))}
                </select>
              </div>

              {/* 2. 取件地點 */}
              {origin && (
                <div>
                  <label className="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                    2. 選擇取件地點
                  </label>
                  <select
                    className="w-full p-3 border-2 border-slate-200 rounded-xl font-bold"
                    value={pickup}
                    onChange={e => {
                      setPickup(e.target.value);
                      setVehicle('');
                    }}
                  >
                    <option value="">請選擇</option>
                    {pricingData[origin].pickupLocations.map(p => (
                      <option key={p} value={p}>{p}</option>
                    ))}
                  </select>
                </div>
              )}

              {/* 3. 車輛類型 */}
              {pickup && (
                <div>
                  <label className="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                    3. 選擇車輛類型
                  </label>
                  <div className="grid grid-cols-3 gap-3">
                    {Object.keys(pricingData[origin].vehicles)
                      .filter(v => isVehicleType(origin, v))
                      .map(v => (
                        <button
                          key={v}
                          onClick={() => setVehicle(v)}
                          className={`py-3 rounded-xl font-black border-2 transition-all
                            ${vehicle === v
                              ? 'bg-[#FFCC00] border-slate-900'
                              : 'bg-white border-slate-200 text-slate-400'}
                          `}
                        >
                          {v}
                        </button>
                      ))}
                  </div>
                </div>
              )}

              {/* 報價結果 */}
              <div className="bg-slate-50 rounded-xl border border-slate-200 p-3 min-h-[220px]">
                {!vehicle ? (
                  <div className="h-full flex items-center justify-center text-slate-300 font-bold">
                    請完成上方選擇
                  </div>
                ) : results.length === 0 ? (
                  <div className="h-full flex items-center justify-center text-slate-400 font-bold">
                    該條件無報價資料
                  </div>
                ) : (
                  <div className="space-y-3 animate-fade-in">
                    {results.map(item => (
                      <div
                        key={`${item.company}-${item.price}`}
                        className={`relative bg-white p-4 rounded-xl border-2
                          ${item.price === minPrice && typeof item.price === 'number'
                            ? 'border-[#FFCC00]'
                            : 'border-slate-100'}
                        `}
                      >
                        {item.price === minPrice && typeof item.price === 'number' && (
                          <div className="absolute top-0 right-0 bg-[#FFCC00] text-[10px] font-black px-2 py-0.5 rounded-bl-lg">
                            最優惠
                          </div>
                        )}

                        <div className="flex justify-between items-start">
                          <div>
                            <div className="text-lg font-black italic">
                              {item.company}
                            </div>
                            {item.phone && (
                              <div className="text-[11px] text-slate-500 font-semibold mt-1">
                                {item.phone}
                              </div>
                            )}
                          </div>

                          <div className="text-right">
                            {typeof item.price === 'number' ? (
                              <>
                                <div className="text-2xl font-black">
                                  {item.price.toLocaleString()}
                                </div>
                                <div className="text-[10px] text-slate-400 font-bold">
                                  元
                                </div>
                              </>
                            ) : (
                              <div className="text-lg font-black text-orange-500">
                                電洽
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

            </div>

            {/* Footer */}
            <div className="bg-slate-50 py-3 text-center border-t border-slate-100">
              <p className="text-[10px] text-red-600 font-black italic">
                ※ 報價為未稅價，實際以合約為準 ※
              </p>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
``
